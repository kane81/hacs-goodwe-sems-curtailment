################################################################################
# SEMS Integration - HACS Auto Install
################################################################################
#
#   Automatically runs install.sh whenever HACS downloads or updates the
#   GoodWe SEMS Curtailment integration.
#
#   Triggers when the HACS update entity for this integration transitions
#   from "on" (update available) to "off" (update installed).
#
#-------------------------------------------------------------------------------
# Change Log
#-------------------------------------------------------------------------------
#   v1.0    2026-04-08    Kane Li    - Initial version
#   v1.1    2026-04-23    Kane Li    - Fixed trigger: HACS 2.0 removed hacs/* events.
#                                      Now uses update entity state change instead.
################################################################################

- id: sems_hacs_auto_install
  alias: SEMS Integration - HACS Auto Install
  description: >
    Runs install.sh automatically when HACS updates the SEMS integration,
    copying files from custom_components into their /config/ locations.
  trigger:
    # Fires when HACS finishes downloading the update (update entity goes off = installed)
    - platform: state
      entity_id: update.home_assistant_goodwe_sems_curtailment_update
      to: "off"
  action:
    - delay: "00:00:05"  # Brief delay to ensure files are written to disk
    - service: shell_command.sems_hacs_install
      response_variable: result
    - service: notify.notification
      data:
        title: "SEMS Integration Updated"
        message: >
          HACS update detected. Install script ran automatically.
          {% if result.returncode == 0 %}
          ✅ Files copied successfully. Reload YAML to apply changes:
          Developer Tools → YAML → Reload All
          {% else %}
          ⚠️ Install script failed. Run manually:
          bash /config/custom_components/sems_curtailment/install.sh
          {% endif %}
