################################################################################
# Home Assistant GoodWe SEMS Curtailment - HA Package
################################################################################
#
# This file is automatically loaded by Home Assistant when you have:
#
#   homeassistant:
#     packages: !include_dir_named packages/
#
# in your configuration.yaml (added by hacs-custom-amber-integration).
#
# IMPORTANT: This integration requires hacs-custom-amber-integration to be
# installed first. It reads amber_general_price_actual and
# amber_feed_in_price_actual which are populated by that project.
#
# DISCLAIMER: This project uses the SEMS Portal API which is not publicly
# documented or officially supported. GoodWe may change or remove this API
# at any time without notice. Use at your own risk.
#
################################################################################

################################################################################
# Shell Commands
################################################################################

shell_command:
  # Sets the GoodWe inverter output limit via SEMS Portal API
  # Usage: service: shell_command.sems_set_power data: { limit: 50 }
  sems_set_power: "python3 /config/scripts/sems_power.py {{ limit }}"

  # Runs the install script to copy integration files after a HACS update
  # Called automatically by sems_hacs_auto_install automation
  sems_hacs_install: "bash /config/custom_components/sems_curtailment/install.sh"

################################################################################
# Input Text
# Battery sensor entity IDs — set these to match your battery integration
# Configure via Settings → Helpers after install
################################################################################

input_text:
  # Entity ID of your battery state of charge sensor (0-100%)
  # AlphaESS example: sensor.al7011025073833_instantaneous_battery_soc
  sensor_battery_soc:
    name: "Sensor - Battery SOC"
    initial: "sensor.your_battery_soc_sensor"

  # Entity ID of your battery power I/O sensor (negative=charging, positive=discharging)
  # AlphaESS example: sensor.al7011025073833_instantaneous_battery_i_o
  sensor_battery_io:
    name: "Sensor - Battery I/O Power"
    initial: "sensor.your_battery_io_sensor"

  # Entity ID of your house load sensor (watts consumed by home)
  # AlphaESS example: sensor.al7011025073833_instantaneous_load
  sensor_load:
    name: "Sensor - House Load"
    initial: "sensor.your_load_sensor"

  # Entity ID of your solar production sensor (watts generated by panels)
  # GoodWe example: sensor.goodwe_ppv
  # AlphaESS example: sensor.al7011025073833_instantaneous_generation
  sensor_solar:
    name: "Sensor - Solar Power"
    initial: "sensor.your_solar_sensor"

  # Entity ID of your grid power sensor (positive=importing, negative=exporting)
  # AlphaESS: use sensor.al7011025073833_instantaneous_grid_i_o_total
  # Note: AlphaESS reports negative=export. The dashboard card negates this automatically.
  sensor_grid:
    name: "Sensor - Grid Power"
    initial: "sensor.your_grid_sensor"

################################################################################
# Input Numbers
################################################################################

input_number:
  # Your inverter's rated capacity in watts
  # e.g. 10000 for a 10kW inverter, 5000 for a 5kW inverter
  sems_inverter_capacity_w:
    name: SEMS Inverter Capacity
    min: 0
    max: 30000
    step: 500
    initial: 10000
    unit_of_measurement: W

  # Tracks the last successfully set inverter power limit (%)
  # Updated automatically by automations — do not edit manually
  sems_current_power_limit:
    name: SEMS Current Power Limit
    min: 0
    max: 100
    step: 1
    initial: 100
    unit_of_measurement: "%"

  # Minimum difference in watts before sems_load_tracking calls the SEMS API
  # Lower = more responsive but more API calls
  # Higher = fewer calls but slower to react
  # 500W is a good starting point for a 10kW inverter
  sems_load_threshold_watts:
    name: SEMS Load Change Threshold
    min: 0
    max: 5000
    step: 100
    initial: 500
    unit_of_measurement: W

  # Battery usable capacity in kWh
  # Used by battery.yaml template to calculate time to full
  battery_capacity_kwh:
    name: Battery Capacity
    min: 0
    max: 100
    step: 0.1
    initial: 10
    unit_of_measurement: kWh

  # Maximum battery charge rate in watts
  # Sets the minimum inverter output floor during curtailment
  # AlphaESS Smile5: 4640W — check your battery spec sheet
  battery_max_charge_rate_w:
    name: Battery Max Charge Rate
    min: 0
    max: 10000
    step: 100
    initial: 3000
    unit_of_measurement: W

################################################################################
# Input Datetimes
################################################################################

input_datetime:
  # Start of curtailment window — inverter resets to 100% at this time
  sems_curtailment_start:
    name: SEMS Curtailment Start
    has_date: false
    has_time: true
    initial: "10:00:00"

  # End of curtailment window — inverter resets to 100% at this time
  sems_curtailment_end:
    name: SEMS Curtailment End
    has_date: false
    has_time: true
    initial: "17:00:00"

################################################################################
# Input Booleans
################################################################################

input_boolean:
  #-----------------------------------------------------------------------------
  # Automation Enable / Disable Switches (default OFF)
  # Toggle via Settings → Helpers or dashboard card
  #-----------------------------------------------------------------------------

  # Enables price-based inverter curtailment
  # Default: OFF — turn ON to activate curtailment based on Amber prices
  # Note: window start/end inverter resets to 100% always run even when OFF
  sems_enable_power_limit:
    name: "Enable Automation: SEMS Power Limit"
    initial: false
    icon: mdi:solar-power

  # Enables real-time load tracking during curtailment
  # Default: OFF — turn ON to activate real-time inverter adjustment
  # Note: sems_enable_power_limit should also be ON for this to be meaningful
  sems_enable_load_tracking:
    name: "Enable Automation: SEMS Load Tracking"
    initial: false
    icon: mdi:chart-line

  #-----------------------------------------------------------------------------
  # Automation State Tracking Flags
  # Set/cleared by automations — do not toggle manually
  #-----------------------------------------------------------------------------

  # True when price curtailment is currently active
  # Set by: sems_power_limit · Read by: sems_load_tracking
  sems_curtailment_active:
    name: SEMS Curtailment Active
    initial: false
