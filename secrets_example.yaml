################################################################################
# SEMS Portal - GoodWe Inverter
# Used by: /config/scripts/sems_power.py
# Portal:  https://au.semsportal.com
#
# How to find these values:
#   email/password: Your SEMS Portal login credentials (same as SEMS+ app)
#   inverter_sn:    Printed on the label on your physical inverter
#                   Also visible in SEMS+ app → Device → Device Info
################################################################################

# SEMS Portal login email
sems_email: your@email.com

# SEMS Portal login password
sems_password: your_sems_password

# GoodWe inverter serial number - printed on inverter label
sems_inverter_sn: YOUR_INVERTER_SN

################################################################################
# Email Notifications
# Used by: configuration_example.yaml notify section
#
# This example uses Gmail. You can use any SMTP email provider — update
# the server, port, encryption fields in configuration_example.yaml to
# match your provider's settings.
#
# Setting up Gmail App Password:
#   1. Go to https://myaccount.google.com/security
#   2. Enable 2-Step Verification (required)
#   3. Search for App Passwords and create one for Mail
#   4. Copy the 16-character generated password
#
# Use the App Password here — NOT your regular Gmail password.
################################################################################

# Gmail account used as sender
smtp_username: your.gmail@gmail.com

# Gmail App Password (16 characters, no spaces required)
smtp_password: your_app_password_here
